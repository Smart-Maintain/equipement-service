server:
  port: 8081
  tomcat:
    max-http-form-post-size: 20MB
    max-swallow-size: 20MB
  servlet:
    context-path: /api/equipement-service

spring:
  application:
    name: equipement-service
  datasource:
    url: jdbc:postgresql://localhost:5432/smartmaintain_db
    username: ${DB_USERNAME:karima}
    password: ${DB_PASSWORD:karima123}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

gemini:
  api:
    key: ${GEMINI_API_KEY:your_api_key_here}